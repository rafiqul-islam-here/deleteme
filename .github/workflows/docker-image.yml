name: Build & Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Build & Push Backend Image
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/app-service-apps:backend-${{ github.sha }} ./backend
          docker tag ${{ secrets.DOCKER_USERNAME }}/app-service-apps:backend-${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/app-service-apps:backend
          docker push ${{ secrets.DOCKER_USERNAME }}/app-service-apps:backend-${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/app-service-apps:backend

      # 4. Build & Push Frontend Image
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/app-service-apps:frontend-${{ github.sha }} ./frontend
          docker tag ${{ secrets.DOCKER_USERNAME }}/app-service-apps:frontend-${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/app-service-apps:frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/app-service-apps:frontend-${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/app-service-apps:frontend
